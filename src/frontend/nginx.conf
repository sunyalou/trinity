# Issue #549: HSTS only when the upstream TLS terminator signals HTTPS via
# X-Forwarded-Proto. This nginx listens on :80 (TLS terminated upstream by
# cloudflare / traefik / external LB), so $scheme is always "http". An empty
# $hsts_header value tells the `add_header` directive to emit nothing.
map $http_x_forwarded_proto $hsts_header {
    default "";
    https   "max-age=31536000; includeSubDomains";
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # File upload support (#364): 3 files × 5 MB base64-encoded ≈ ~21 MB JSON
    client_max_body_size 25m;

    # Strip server version from responses
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    gzip_comp_level 6;

    # Security headers (shared include — see security-headers.conf for details)
    include /etc/nginx/security-headers.conf;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://trinity-backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;

        # SSE (Server-Sent Events) support - required for live execution streaming
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # WebSocket support
    location /ws {
        proxy_pass http://trinity-backend:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    # NOTE: include is required here — nginx drops server-level add_header
    # when a location block defines its own add_header directives.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/security-headers.conf;
    }

    # Don't cache index.html
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        include /etc/nginx/security-headers.conf;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
        include /etc/nginx/security-headers.conf;
    }
}
