# Production Docker Compose for Trinity Agent Platform
#
# Port allocation:
#   - 8000: Trinity backend
#   - 80: Trinity frontend (standard HTTP)
#   - 8080: Trinity MCP server
#   - 8001: Scheduler service (internal health check)
#   - 8686: Vector log aggregator
#   - 4317: OTel Collector gRPC (OTLP)
#   - 4318: OTel Collector HTTP (OTLP)
#   - 8889: OTel Prometheus metrics

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      # Build-time provenance (#926 / #958). Forwarded to Dockerfile ARGs
      # → ENV vars → `GET /api/version` payload. The deploy-dev workflow
      # exports these from the checked-out repo before `docker compose
      # build`; absent that, the Dockerfile defaults to "unknown".
      args:
        VERSION: ${VERSION:-unknown}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        GIT_COMMIT_SUBJECT: ${GIT_COMMIT_SUBJECT:-unknown}
        GIT_COMMIT_TIMESTAMP: ${GIT_COMMIT_TIMESTAMP:-unknown}
        GIT_BRANCH: ${GIT_BRANCH:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: trinity-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - "ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env (admin login + MCP auth)}"
      # REDIS_URL embeds the `backend` ACL user — see docker-compose redis service.
      - "REDIS_URL=redis://backend:${REDIS_BACKEND_PASSWORD:?REDIS_BACKEND_PASSWORD must be set in .env}@redis:6379"
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      # Socket Mode concurrent WebSocket count (#244); clamped to [1,10], default 2.
      # Mirrors docker-compose.yml — without this line the .env knob is inert in
      # prod (the #1039 packaging-gap class).
      - SLACK_SOCKET_CONNECTION_COUNT=${SLACK_SOCKET_CONNECTION_COUNT:-2}
      - CREDENTIAL_ENCRYPTION_KEY=${CREDENTIAL_ENCRYPTION_KEY:-}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-resend}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@trinity.example.com}
      # SMTP transport (EMAIL_PROVIDER=smtp) — read by src/backend/config.py (#771)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      # SendGrid transport (EMAIL_PROVIDER=sendgrid) — read by src/backend/config.py (#771)
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - NOTION_CLIENT_ID=${NOTION_CLIENT_ID}
      - NOTION_CLIENT_SECRET=${NOTION_CLIENT_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}  # For Gemini-powered agents
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}  # For platform image generation (IMG-001)
      # Gemini model overrides (#1130) — mirrors docker-compose.yml; without these
      # lines the env knobs are inert in prod (#1039 packaging-gap class). Non-empty
      # defaults so an unset var doesn't inject "" (#1076).
      - GEMINI_TEXT_MODEL=${GEMINI_TEXT_MODEL:-gemini-3.5-flash}              # image-gen prompt refinement
      - GEMINI_TRANSCRIPTION_MODEL=${GEMINI_TRANSCRIPTION_MODEL:-gemini-3.5-flash}  # Telegram voice transcription
      # Voice chat (VOICE-001) — mirrors docker-compose.yml so operators can
      # tune/disable voice in prod (code default is ON; without these lines the
      # knobs are inert — the #1039 packaging-gap class).
      - VOICE_MODEL=${VOICE_MODEL:-models/gemini-3.1-flash-live-preview}  # Gemini Live model override (#1076: non-empty default so an unset var doesn't inject "")
      - VOICE_ENABLED=${VOICE_ENABLED:-true}  # Voice mode (default on when GEMINI_API_KEY set)
      - WORKSPACE_ENABLED=${WORKSPACE_ENABLED:-false}  # Voice Workspace canvas — opt-in BETA (#860)
      # VoIP telephony (VOIP-001, #1056) — opt-in, default OFF. Default-OFF means
      # the master switch MUST reach the container or voip_available stays false;
      # omitting it here was the prod packaging gap (same class as #1039 LOG_*).
      - VOIP_ENABLED=${VOIP_ENABLED:-false}
      - VOIP_MAX_CALL_DURATION=${VOIP_MAX_CALL_DURATION:-600}      # per-call cap (s)
      - VOIP_DEFAULT_DAILY_CALL_CAP=${VOIP_DEFAULT_DAILY_CALL_CAP:-50}  # per-agent/day spend bound
      - VOIP_CALL_RATE_LIMIT=${VOIP_CALL_RATE_LIMIT:-5}           # calls per owner+destination window
      - VOIP_CALL_RATE_WINDOW=${VOIP_CALL_RATE_WINDOW:-60}        # rate-limit window (s)
      - VOIP_TICKET_TTL_SECONDS=${VOIP_TICKET_TTL_SECONDS:-180}   # Media Streams WSS ticket TTL
      - VOIP_INTENT_TTL_SECONDS=${VOIP_INTENT_TTL_SECONDS:-180}   # staged Gemini-intent TTL
      - GITHUB_PAT=${GITHUB_PAT}
      # Host paths for volumes (used when creating agent containers)
      - HOST_TEMPLATES_PATH=${HOST_TEMPLATES_PATH:-${PWD}/config/agent-templates}
      # OpenTelemetry Configuration (Optional)
      - OTEL_ENABLED=${OTEL_ENABLED:-0}
      - OTEL_COLLECTOR_ENDPOINT=${OTEL_COLLECTOR_ENDPOINT:-http://trinity-otel-collector:4317}
      - OTEL_METRICS_EXPORTER=${OTEL_METRICS_EXPORTER:-otlp}
      - OTEL_LOGS_EXPORTER=${OTEL_LOGS_EXPORTER:-otlp}
      - OTEL_EXPORTER_OTLP_PROTOCOL=${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      - OTEL_METRIC_EXPORT_INTERVAL=${OTEL_METRIC_EXPORT_INTERVAL:-60000}
      # Public external access URL (Tailscale Funnel, Cloudflare Tunnel, etc.)
      - PUBLIC_CHAT_URL=${PUBLIC_CHAT_URL:-}
      # Frontend URL for post-OAuth redirects
      - FRONTEND_URL=${FRONTEND_URL:-}
      # CORS — comma-separated extra allowed origins (read by config.py via
      # EXTRA_CORS_ORIGINS). Mirrors docker-compose.yml; without this line the
      # .env value is inert in prod (the #1039 packaging-gap class).
      - EXTRA_CORS_ORIGINS=${EXTRA_CORS_ORIGINS:-}
      # Backend's own public origin — used to build OAuth redirect URIs
      # ({BACKEND_URL}/api/oauth/{provider}/callback, read by config.py). Mirrors
      # docker-compose.yml; without this line the .env value is inert in prod (the
      # #1039 packaging-gap class) and OAuth callbacks fall back to localhost — set
      # this to your public backend URL. The scheduler reads BACKEND_URL too but
      # keeps its own internal default (http://backend:8000); intentionally not
      # wired here so it still reaches the backend over the Docker network.
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8000}
      # Internal API shared secret (C-003) - for scheduler/agent communication
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      # Configurable database backend (#300, experimental) — mirrors
      # docker-compose.yml; without these lines the .env lever is inert in prod
      # (the #1039/#1056 packaging-gap class). Unset → SQLite at /data/trinity.db.
      # Prod compose ships no postgres service: a postgresql:// URL must point at
      # an operator-managed PostgreSQL instance (see docs/POSTGRESQL_SETUP.md).
      - DATABASE_URL=${DATABASE_URL:-}
      - DB_POOL_SIZE=${DB_POOL_SIZE:-10}
      - DB_MAX_OVERFLOW=${DB_MAX_OVERFLOW:-20}
      # Fire-and-forget dispatch (#1083). When true, eligible autonomous turns
      # ({schedule, webhook}) are dispatched 202 + finalized via callback so a
      # wedged turn holds zero backend coroutine/slot beyond its lease. Mirrors
      # docker-compose.yml; without this line the .env lever is inert in prod
      # (the #1039 packaging-gap class). Default false; safe to flip early
      # (non-202 agent responses fall back to sync). Backend-only.
      - DISPATCH_ASYNC=${DISPATCH_ASYNC:-false}
      # Host telemetry (/api/telemetry) — container-stats cache freshness (s) and
      # max concurrent Docker stat fetches per refresh. Mirrors docker-compose.yml;
      # without these lines the .env knobs are inert in prod (the #1039
      # packaging-gap class).
      - TELEMETRY_CONTAINER_STATS_TTL=${TELEMETRY_CONTAINER_STATS_TTL:-10}
      - TELEMETRY_DOCKER_POOL_SIZE=${TELEMETRY_DOCKER_POOL_SIZE:-16}
      # SSH access host override (read by services/ssh_service.py). Mirrors
      # docker-compose.yml; without this line the .env value is inert in prod (the
      # #1039 packaging-gap class) and SSH host detection falls back to localhost.
      - SSH_HOST=${SSH_HOST:-}
      # Log retention & archival (services/log_archive_service.py). Mirrors
      # docker-compose.yml; without these lines the .env knobs are inert in prod
      # (the #1039 packaging-gap class). LOG_ARCHIVE_PATH is intentionally omitted:
      # the code default (/data/archives) already lands in the TRINITY_DATA_PATH
      # bind mount (/data), so no new volume is needed.
      - LOG_ARCHIVE_ENABLED=${LOG_ARCHIVE_ENABLED:-true}
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-90}
      - LOG_CLEANUP_HOUR=${LOG_CLEANUP_HOUR:-3}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/agent-templates:/agent-configs/templates:ro
      - ./config/process-templates:/agent-configs/process-templates:ro
      - ./config/process-docs:/app/config/process-docs:ro
      - agent-configs:/agent-configs
      - ${TRINITY_DATA_PATH:-./trinity-data}:/data
      # Read-only access to Vector's logs so log_archive_service.py (reads
      # /data/logs) can run in prod. Mirrors docker-compose.yml; without it the
      # forwarded LOG_* knobs are inert (LOG_DIR not found) — the #1039 class.
      - trinity-logs:/data/logs:ro
    depends_on:
      redis:
        condition: service_healthy
      vector:
        condition: service_healthy  # Ensure Vector is ready before backend starts agents
    networks:
      - trinity-platform   # Redis, scheduler, vector, OTel
      - trinity-agent      # Frontend, mcp-server, agent containers, cloudflared
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # No cap_add: backend listens on 8000 (>=1024, no NET_BIND_SERVICE needed)
    # and reaches /var/run/docker.sock via group_add below — not capabilities.
    # Issue #874: backend runs as UID 1000 (non-root) but still needs to talk
    # to /var/run/docker.sock. On Linux the socket is group-owned by `docker`
    # (typically GID 999 on Debian/Ubuntu, ~990 on RHEL family). macOS Docker
    # Desktop ignores group_add; the default is safe there.
    group_add:
      - "${DOCKER_GID:-999}"
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    # Production: no --reload flag
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2 --timeout-worker-healthcheck 120
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./src/frontend
      dockerfile: ../../docker/frontend/Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    image: trinity-frontend:prod
    container_name: trinity-frontend
    restart: unless-stopped
    # Issue #874: container nginx binds 8080 (unprivileged). Host port 80
    # preserved so external URLs do not change.
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - trinity-agent      # Frontend talks to backend on agent network
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # NET_BIND_SERVICE / CHOWN / SETGID / SETUID removed (#874):
    # unprivileged nginx binds 8080 and does no master-process worker drop.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: trinity-redis
    restart: unless-stopped
    # Redis not exposed externally in production
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - trinity-platform   # Issue #589: Redis is NOT on agent network
    environment:
      # Two passwords by design — see docs/migrations/REDIS_AUTH.md.
      - "REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env (generate openssl rand -hex 24)}"
      - "REDIS_BACKEND_PASSWORD=${REDIS_BACKEND_PASSWORD:?REDIS_BACKEND_PASSWORD must be set in .env (generate openssl rand -hex 24)}"
    # Additive ACL — start from zero, allow only what the runtime needs.
    # `+@all -X` is rejected: it includes commands Redis hasn't shipped yet.
    # NB: each `--user` rule must be its own argv (Redis CLI parser).
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --requirepass
      - ${REDIS_PASSWORD}
      # default — admin user, full access (used for ACL bootstrap and ad-hoc ops)
      - --user
      - default
      - "on"
      - ">${REDIS_PASSWORD}"
      - "~*"
      - "&*"
      - "+@all"
      # backend — runtime user for backend container
      - --user
      - backend
      - "on"
      - ">${REDIS_BACKEND_PASSWORD}"
      - "~*"
      - "&*"
      - "+@read"
      - "+@write"
      - "+@connection"
      - "+@keyspace"
      - "+@stream"
      - "+@list"
      - "+@set"
      - "+@sortedset"
      - "+@hash"
      - "+@scripting"
      - "+@transaction"
      - "+@pubsub"
      - "-@dangerous"
      # scheduler — same access pattern as backend; separate user for traceability
      - --user
      - scheduler
      - "on"
      - ">${REDIS_BACKEND_PASSWORD}"
      - "~*"
      - "&*"
      - "+@read"
      - "+@write"
      - "+@connection"
      - "+@keyspace"
      - "+@stream"
      - "+@list"
      - "+@set"
      - "+@sortedset"
      - "+@hash"
      - "+@scripting"
      - "+@transaction"
      - "+@pubsub"
      - "-@dangerous"
    # Healthcheck pings as the `backend` ACL user so a typo'd ACL keeps
    # Redis unhealthy and gates dependent services.
    # Password passed via REDISCLI_AUTH env var (not -a flag) so it does
    # not appear in /proc/<pid>/cmdline during the healthcheck (CSO OBS-3).
    healthcheck:
      test:
        - CMD-SHELL
        - REDISCLI_AUTH="$$REDIS_BACKEND_PASSWORD" redis-cli --user backend --no-auth-warning ping | grep -q PONG
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Scheduler - dedicated service for cron-based agent task execution
  # Prevents duplicate executions that occurred with multiple backend workers
  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    container_name: trinity-scheduler
    restart: unless-stopped
    environment:
      - DATABASE_PATH=/data/trinity.db
      # #300: when set to a postgresql:// URL the scheduler reads/writes Postgres
      # (the same DB the backend uses); unset → shared SQLite at DATABASE_PATH.
      - DATABASE_URL=${DATABASE_URL:-}
      # Scheduler uses the same `backend` ACL user (identical access patterns).
      - "REDIS_URL=redis://backend:${REDIS_BACKEND_PASSWORD:?REDIS_BACKEND_PASSWORD must be set in .env}@redis:6379"
      - HEALTH_PORT=8001
      - LOG_LEVEL=${SCHEDULER_LOG_LEVEL:-INFO}
      - LOCK_TIMEOUT=600
      - AGENT_TIMEOUT=900
      # #1022: scheduler→backend dispatch + pre-check deadlines (operator-tunable).
      - DISPATCH_TIMEOUT=${DISPATCH_TIMEOUT:-30}
      - PRE_CHECK_TIMEOUT=${PRE_CHECK_TIMEOUT:-70}
      - MISFIRE_GRACE_TIME=3600
      - PUBLISH_EVENTS=true
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
    volumes:
      - ${TRINITY_DATA_PATH:-./trinity-data}:/data
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - trinity-platform   # Scheduler talks only to Redis + backend; never to agents
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Vector - centralized log aggregation from all containers
  vector:
    image: timberio/vector:0.43.1-alpine
    container_name: trinity-vector
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/vector.yaml:/etc/vector/vector.yaml:ro
      - trinity-logs:/data/logs
    ports:
      - "8686:8686"  # Vector API (health checks)
    networks:
      - trinity-platform   # Vector reads via Docker socket, not network — platform side
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8686/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s  # Give Vector time to start before health checks

  mcp-server:
    build:
      context: ./src/mcp-server
      dockerfile: Dockerfile
    container_name: trinity-mcp-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - MCP_PORT=8080
      - TRINITY_API_URL=http://backend:8000
      - TRINITY_USERNAME=${TRINITY_USERNAME:-admin}
      # MCP server uses ADMIN_PASSWORD for legacy non-API-key auth path.
      # Fail-loud at compose render rather than silently use a well-known fallback (issue #692).
      - "TRINITY_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}"
      - MCP_REQUIRE_API_KEY=${MCP_REQUIRE_API_KEY:-true}
      # INTERNAL_API_SECRET (SEC-001) — shared secret for POST /api/internal/audit
      # so MCP tool-call audit reaches the backend. Mirrors docker-compose.yml;
      # without it audit.ts (postAudit) early-returns and ALL MCP tool-call audit
      # is silently dropped in prod (the #1039 packaging-gap class). No default —
      # matches the backend/scheduler prod style.
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET}
      # No REDIS_URL: src/mcp-server/ (TypeScript) has zero Redis imports.
      # Don't hand a credential to a process that has no use for it.
    depends_on:
      backend:
        condition: service_healthy
    networks:
      # MCP server straddles both networks: agents call http://mcp-server:8080/mcp
      # via Docker DNS on the agent network; backend reaches it on platform network.
      - trinity-platform
      - trinity-agent
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Cloudflare Tunnel - public endpoint access (Telegram webhooks, public chat, Slack OAuth)
  # Only starts when explicitly enabled via: docker compose --profile tunnel up -d
  # Requires TUNNEL_TOKEN from Cloudflare Zero Trust dashboard
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: trinity-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      # Cloudflared proxies to backend (platform side) and public agents (agent side).
      - trinity-platform
      - trinity-agent
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles:
      - tunnel

  # OpenTelemetry Collector - receives metrics from Claude Code agents
  # Using contrib image for deltatocumulative processor (required for Prometheus export)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: trinity-otel-collector
    restart: unless-stopped
    ports:
      - "4317:4317"   # gRPC receiver (OTLP)
      - "4318:4318"   # HTTP receiver (OTLP)
      - "8889:8889"   # Prometheus metrics exporter
      - "13133:13133" # Health check endpoint
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - trinity-platform
      - trinity-agent      # Agents push metrics directly to the collector
    labels:
      - "trinity.platform=infrastructure"
      - "trinity.service=otel-collector"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # NOTE: No healthcheck - distroless image has no shell/curl
    # Collector health can be checked externally via :13133 if health_check extension is enabled

volumes:
  agent-configs:
  redis-data:
  trinity-logs:  # Vector log storage
  # trinity-data: using bind mount via TRINITY_DATA_PATH env var

networks:
  # Platform-internal network: Redis, scheduler, backend, mcp-server, vector, otel.
  # Agents NEVER join this network — Issue #589 (Redis lockdown).
  trinity-platform:
    driver: bridge
    name: trinity-platform-network
    ipam:
      config:
        - subnet: 172.29.0.0/16
  # Agent-facing network: agents, frontend, plus the bridges that need to reach
  # them (backend, mcp-server, otel-collector, cloudflared). Name preserved so
  # the three agent-creation sites in services/agent_service/* and
  # system_agent_service.py need zero code changes.
  trinity-agent:
    driver: bridge
    name: trinity-agent-network
    ipam:
      config:
        - subnet: 172.28.0.0/16
