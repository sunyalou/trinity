name: Sync Docs to Vertex AI Search

on:
  push:
    branches: [main]
    paths:
      - 'docs/onboarding/**'
      - 'docs/user-docs/**'
  workflow_dispatch:

env:
  PROJECT_ID: mcp-server-project-455215
  BUCKET: gs://trinity-docs-rag-mcp-server-project-455215
  DATA_STORE_ID: trinity-docs
  LOCATION: global

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        # SHA-pinned to mitigate supply-chain hijack of the v2 floating tag.
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        # SHA-pinned to mitigate supply-chain hijack of the v2 floating tag.
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Convert and sync docs to GCS
        run: |
          # Convert .md to .txt with text/plain content type (Vertex AI Search requirement)
          mkdir -p /tmp/docs-txt

          # Sync docs/onboarding (flat)
          for file in docs/onboarding/*.md; do
            [ -f "$file" ] || continue
            basename=$(basename "$file" .md)
            cp "$file" "/tmp/docs-txt/${basename}.txt"
          done

          # Sync docs/user-docs (recursive, preserve relative paths with hyphens)
          find docs/user-docs -name "*.md" -type f | while read file; do
            # Convert path like docs/user-docs/guides/building-agents.md to user-docs-guides-building-agents.txt
            relpath="${file#docs/user-docs/}"
            txtname=$(echo "$relpath" | sed 's|/|-|g' | sed 's|\.md$|.txt|')
            cp "$file" "/tmp/docs-txt/${txtname}"
          done

          # Sync to GCS with explicit content type
          gsutil -m -h "Content-Type:text/plain" rsync -r -d /tmp/docs-txt/ ${{ env.BUCKET }}/txt/
          echo "Synced $(gsutil ls ${{ env.BUCKET }}/txt/ | wc -l) files"

      - name: Trigger document re-import
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            -H "X-Goog-User-Project: ${{ env.PROJECT_ID }}" \
            "https://discoveryengine.googleapis.com/v1/projects/${{ env.PROJECT_ID }}/locations/${{ env.LOCATION }}/collections/default_collection/dataStores/${{ env.DATA_STORE_ID }}/branches/default_branch/documents:import" \
            -d '{
              "gcsSource": {
                "inputUris": ["${{ env.BUCKET }}/txt/*"],
                "dataSchema": "content"
              },
              "reconciliationMode": "FULL"
            }'
          echo "Document re-import triggered"
