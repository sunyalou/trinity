name: Publish CLI to PyPI

on:
  push:
    tags:
      - 'cli-v*'
    branches:
      - main
    paths:
      - 'src/cli/**'

permissions:
  contents: write
  id-token: write  # Required for trusted publishing

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/trinity-cli/
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for tag detection

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/cli-v* ]]; then
            # Tag-triggered: extract version from tag (cli-v0.3.0 → 0.3.0)
            VERSION="${GITHUB_REF_NAME#cli-v}"
          else
            # Push-triggered: auto-increment patch from latest cli-v* tag
            LATEST_TAG=$(git tag -l 'cli-v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST_TAG" ]; then
              VERSION="0.1.0"
            else
              BASE="${LATEST_TAG#cli-v}"
              MAJOR=$(echo "$BASE" | cut -d. -f1)
              MINOR=$(echo "$BASE" | cut -d. -f2)
              PATCH=$(echo "$BASE" | cut -d. -f3)
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Check if version already exists on PyPI
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/trinity-cli/${VERSION}/json")
          if [ "$STATUS" = "200" ]; then
            echo "Version $VERSION already exists on PyPI — skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Inject version into pyproject.toml
        if: steps.check.outputs.skip != 'true'
        working-directory: src/cli
        run: |
          sed -i 's/^version = .*/version = "${{ steps.version.outputs.version }}"/' pyproject.toml
          grep '^version' pyproject.toml

      - name: Install build tools
        if: steps.check.outputs.skip != 'true'
        run: pip install build

      - name: Build package
        if: steps.check.outputs.skip != 'true'
        working-directory: src/cli
        run: python -m build

      - name: Publish to PyPI
        if: steps.check.outputs.skip != 'true'
        # SHA-pinned to mitigate supply-chain hijack of the release/v1 branch.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: src/cli/dist/

      - name: Create git tag
        if: steps.check.outputs.skip != 'true' && !startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="cli-v${VERSION}"
          git tag "$TAG"
          git push origin "$TAG"

  update-homebrew:
    name: Update Homebrew formula
    needs: publish
    if: needs.publish.outputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Wait for PyPI availability
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          URL="https://files.pythonhosted.org/packages/source/t/trinity-cli/trinity_cli-${VERSION}.tar.gz"
          echo "Waiting for $URL ..."
          for i in $(seq 1 30); do
            if curl -sf --head "$URL" > /dev/null 2>&1; then
              echo "Available after ${i}0 seconds"
              break
            fi
            sleep 10
          done

      - name: Download sdist and compute sha256
        id: hash
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          URL="https://files.pythonhosted.org/packages/source/t/trinity-cli/trinity_cli-${VERSION}.tar.gz"
          curl -sfL -o trinity_cli.tar.gz "$URL"
          SHA256=$(sha256sum trinity_cli.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA256"

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.publish.outputs.version }}"
          SHA256="${{ steps.hash.outputs.sha256 }}"

          # Clone the tap repo
          git clone "https://x-access-token:${GH_TOKEN}@github.com/abilityai/homebrew-tap.git" tap
          cd tap

          FORMULA="Formula/trinity-cli.rb"
          if [ ! -f "$FORMULA" ]; then
            echo "Formula not found at $FORMULA, checking root..."
            FORMULA="trinity-cli.rb"
          fi

          # Update version URL and sha256 (handles both hash-based and source/ URL formats)
          sed -i "s|url \"https://files.pythonhosted.org/packages/.*/trinity_cli-.*\.tar\.gz\"|url \"https://files.pythonhosted.org/packages/source/t/trinity-cli/trinity_cli-${VERSION}.tar.gz\"|" "$FORMULA"
          sed -i "0,/sha256 \"[a-f0-9]*\"/s|sha256 \"[a-f0-9]*\"|sha256 \"${SHA256}\"|" "$FORMULA"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FORMULA"
          git commit -m "trinity-cli ${VERSION}" || echo "No changes to commit"
          git push
