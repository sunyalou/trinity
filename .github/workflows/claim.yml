name: Issue Claim

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  claim:
    if: >
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '/claim')
    runs-on: ubuntu-latest
    steps:
      - name: Check if already assigned
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            const commenter = context.payload.comment.user.login;

            // Check if issue is already assigned
            if (issue.assignees.length > 0) {
              const assignees = issue.assignees.map(a => a.login).join(', ');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `@${commenter} This issue is already assigned to ${assignees}. Use \`/unclaim\` first if you want to take over.`
              });
              return;
            }

            // Assign the commenter
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: [commenter]
            });

            // Add status-in-progress label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['status-in-progress']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `Claimed by @${commenter}. Label \`status-in-progress\` added.\n\nNext steps:\n1. Create branch: \`feature/${issue.number}-<short-slug>\`\n2. Implement the feature\n3. Open a PR with \`Fixes #${issue.number}\``
            });

  unclaim:
    if: >
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '/unclaim')
    runs-on: ubuntu-latest
    steps:
      - name: Unclaim issue
        uses: actions/github-script@v9
        with:
          script: |
            const issue = context.payload.issue;
            const commenter = context.payload.comment.user.login;

            // Only allow the assignee or repo admins to unclaim
            const isAssigned = issue.assignees.some(a => a.login === commenter);
            if (!isAssigned) {
              // Check if commenter has admin/write access
              const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: commenter
              });
              if (!['admin', 'write'].includes(perm.permission)) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `@${commenter} Only the assignee or maintainers can unclaim an issue.`
                });
                return;
              }
            }

            // Remove all assignees
            await github.rest.issues.removeAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: issue.assignees.map(a => a.login)
            });

            // Remove status-in-progress label
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: 'status-in-progress'
              });
            } catch (e) {
              // Label might not exist, that's fine
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `Issue unclaimed by @${commenter}. Available for pickup.`
            });
