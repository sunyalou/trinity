name: trinity
display_name: Trinity Platform
description: |
  Deep Agent Orchestration Platform — sovereign infrastructure for deploying,
  orchestrating, and governing autonomous AI systems that plan, reason, and
  execute independently. Implements hierarchical delegation, persistent memory,
  extreme context engineering, and autonomous operations.
avatar_prompt: A commanding orchestrator figure in a sleek dark coat standing before a holographic constellation of connected nodes, each glowing with autonomous energy — calm authority, strategic vision, deep blue and silver palette, cinematic lighting
resources:
  cpu: "2"
  memory: "4g"

# Persistent-state allowlist (S4, abilityai/trinity#383).
# Glob patterns for workspace files that must survive a template-level reset
# (e.g. the future "adopt main, preserve state" operation — see #384). At
# agent creation this list is materialized into
# `.trinity/persistent-state.yaml` inside the container; runtime sync/reset
# paths read that file, not this one. Operators can edit the on-disk copy
# per-agent. Omit the key to inherit the default list defined in
# `src/backend/services/git_service.py::DEFAULT_PERSISTENT_STATE`.
persistent_state:
  - workspace/**
  - .trinity/**
  - .mcp.json
  - opencode.json
  - .opencode/
  - .config/opencode/opencode.json
  - .claude.json
  - .claude/.credentials.json
